name: Bug report
description: Report a MusePilot bug that is not specific to Qobuz local downloads
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste API keys, Qobuz tokens, passwords, browser cookies, Local Storage dumps, or signed stream URLs.
  - type: input
    id: volumio_version
    attributes:
      label: Volumio version
      placeholder: "Example: Volumio 3.x or 4.x"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and architecture
      placeholder: "Example: Raspberry Pi 4 arm64"
    validations:
      required: true
  - type: input
    id: musepilot_version
    attributes:
      label: MusePilot version or commit
      placeholder: "Example: 0.1.0 or git SHA"
  - type: dropdown
    id: source
    attributes:
      label: Music source
      options:
        - Auto
        - Qobuz
        - TIDAL
        - Local MPD
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the problem happened?
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove API keys, Qobuz tokens, passwords, cookies, Local Storage dumps, and signed URLs before posting.
      render: text
